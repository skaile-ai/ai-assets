id: "concept-only"
version: "1.0.0"
name: "Concept Only"
description: "Produces a complete concept document package without implementation. For planning, documentation, or handing off to a development team."
metadata:
  tags:
    - "concept"
    - "documentation"
    - "planning"
    - "handoff"
    - "no-code"
  stage: "stable"
  icon: "i-heroicons-document-text"
  category: "concept"
  onboarding:
    input_style: "structured"
    fields:
      - "app_name"
      - "problem"
      - "audience"
      - "notes"
globals:
  research_depth: "moderate"
  approval_mode: "checkpoint"
  auto_review: true
  subagent_mode: true
  verbosity: "detailed"
tier_presets:
  quick:
    skaileup-research: light
    skaileup-discovery: light
    skaileup-experience: light
    skaileup-prototype: none
    skaileup-storybook: none
    skaileup-blueprint: light
    skaileup-concept-meta: none
  standard:
    skaileup-research: medium
    skaileup-discovery: medium
    skaileup-experience: medium
    skaileup-prototype: light
    skaileup-storybook: none
    skaileup-blueprint: medium
    skaileup-concept-meta: light
  thorough:
    skaileup-research: max
    skaileup-discovery: max
    skaileup-experience: max
    skaileup-prototype: medium
    skaileup-storybook: max
    skaileup-blueprint: max
    skaileup-concept-meta: medium
modes:
  research:
    enabled: true
    skill: "skailup-research"
    triggers:
      - "overview"
      - "features"
      - "brand-visual"
      - "datamodel"
      - "screens"
    parameters:
      topics:
        - "domain"
        - "competitors"
        - "audiences"
        - "design-inspiration"
        - "patterns"
  standards:
    enabled: false
entry: "onboard"
nodes:
  - id: "onboard"
    type: "skill"
    position:
      x: -400
      y: 200
    data:
      skill: "skailup-onboard"
      label: "Project Onboarding"
      optional: false
  - id: "ingest-seeds"
    type: "skill"
    position:
      x: -200
      y: 200
    data:
      skill: "skailup-ingest-seeds"
      label: "Ingest Seeds"
      optional: true
      skip_when: "no_seeds_dir"
  - id: "g-concept"
    type: "group"
    position:
      x: 0
      y: 0
    style:
      width: 1400
      height: 480
      backgroundColor: "rgba(99,102,241,0.04)"
      border: "1px solid rgba(99,102,241,0.2)"
      borderRadius: "12px"
    data:
      label: "Concept"
      phase: "conceptualization"
  - id: "overview"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 40
      y: 200
    data:
      skill: "skailup-overview"
      label: "Project Brief"
      optional: false
      depth_from: "skaileup-discovery"
  - id: "journeys"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 280
      y: 80
    data:
      skill: "skailup-journeys"
      label: "User Journeys"
      optional: false
      depth_from: "skaileup-experience"
      parameters:
        hero_approval_required: true
      overrides:
        skip_checks:
          - "_concept/1_discovery/1_overview/brief.md"
  - id: "brand-visual"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 280
      y: 240
    data:
      skill: "skailup-brand-visual"
      label: "Brand Visual"
      optional: false
      depth_from: "skaileup-discovery"
      parallel_group: "identity"
      overrides:
        skip_checks:
          - "_concept/1_discovery/1_overview/brief.md"
  - id: "techstack"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 280
      y: 380
    data:
      skill: "skailup-techstack"
      label: "Tech Stack"
      optional: false
      depth_from: "skaileup-blueprint"
      parallel_group: "identity"
      overrides:
        skip_checks:
          - "_concept/1_discovery/1_overview/brief.md"
  - id: "features"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 560
      y: 200
    data:
      skill: "skailup-features"
      label: "Features"
      optional: false
      depth_from: "skaileup-experience"
      subagent: true
      overrides:
        skip_checks:
          - "_concept/1_discovery/1_overview/brief.md"
          - "_concept/2_experience/1_journeys/stories.json"
  - id: "brand-behavioral"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 560
      y: 80
    data:
      skill: "skailup-brand-behavioral"
      label: "Brand Behavioral"
      optional: true
      depth_from: "skaileup-discovery"
      skip_when:
        tier_is: none
      overrides:
        skip_checks:
          - "_concept/1_discovery/1_overview/brief.md"
  - id: "behaviors"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 560
      y: 340
    data:
      skill: "skailup-behaviors"
      label: "Behaviors"
      optional: true
      depth_from: "skaileup-experience"
      skip_when:
        tier_is: none
      overrides:
        skip_checks:
          - "_concept/2_experience/2_features"
  - id: "architecture"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 840
      y: 80
    data:
      skill: "skailup-architecture"
      label: "Architecture"
      optional: false
      depth_from: "skaileup-blueprint"
      subagent: true
      overrides:
        skip_checks:
          - "_concept/1_discovery/1_overview/brief.md"
          - "_concept/2_experience/2_features"
  - id: "datamodel"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 840
      y: 240
    data:
      skill: "skailup-datamodel"
      label: "Data Model"
      optional: false
      depth_from: "skaileup-blueprint"
      subagent: true
      overrides:
        skip_checks:
          - "_concept/2_experience/2_features"
  - id: "screens"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 1120
      y: 200
    data:
      skill: "skailup-screens"
      label: "Screens"
      optional: false
      depth_from: "skaileup-experience"
      subagent: true
      overrides:
        skip_checks:
          - "_concept/2_experience/2_features"
  - id: "components"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 1120
      y: 60
    data:
      skill: "skailup-components"
      label: "Components"
      optional: true
      depth_from: "skaileup-experience"
      skip_when:
        tier_is: none
      overrides:
        skip_checks:
          - "_concept/2_experience/2_features"
  - id: "storybook"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 1120
      y: 340
    data:
      skill: "skailup-storybook"
      label: "Storybook"
      optional: true
      depth_from: "skaileup-storybook"
      skip_when:
        tier_is: none
      overrides:
        skip_checks:
          - "_concept/2_experience/2_features"
  - id: "mock"
    type: "skill"
    parentNode: "g-concept"
    position:
      x: 1120
      y: 200
    data:
      skill: "skailup-mock"
      label: "Mockups"
      optional: true
      depth_from: "skaileup-prototype"
      skip_when:
        tier_is: none
      parameters:
        framework: "vue"
      overrides:
        skip_checks:
          - "_concept/2_experience/2_features"
edges:
  - id: "e-onboard-ingest"
    source: "onboard"
    target: "ingest-seeds"
    type: "flow"
  - id: "e-ingest-overview"
    source: "ingest-seeds"
    target: "overview"
    type: "flow"
  - id: "e-overview-journeys"
    source: "overview"
    target: "journeys"
    type: "flow"
  - id: "e-overview-brand"
    source: "overview"
    target: "brand-visual"
    type: "parallel"
  - id: "e-overview-techstack"
    source: "overview"
    target: "techstack"
    type: "parallel"
  - id: "e-journeys-features"
    source: "journeys"
    target: "features"
    type: "flow"
  - id: "e-brand-behavioral"
    source: "brand-visual"
    target: "brand-behavioral"
    type: "optional"
  - id: "e-features-behaviors"
    source: "features"
    target: "behaviors"
    type: "optional"
  - id: "e-features-architecture"
    source: "features"
    target: "architecture"
    type: "flow"
  - id: "e-techstack-architecture"
    source: "techstack"
    target: "architecture"
    type: "flow"
  - id: "e-features-datamodel"
    source: "features"
    target: "datamodel"
    type: "flow"
  - id: "e-techstack-datamodel"
    source: "techstack"
    target: "datamodel"
    type: "flow"
  - id: "e-architecture-datamodel"
    source: "architecture"
    target: "datamodel"
    type: "flow"
  - id: "e-behaviors-datamodel"
    source: "behaviors"
    target: "datamodel"
    type: "optional"
  - id: "e-datamodel-screens"
    source: "datamodel"
    target: "screens"
    type: "flow"
  - id: "e-brand-screens"
    source: "brand-visual"
    target: "screens"
    type: "flow"
  - id: "e-techstack-screens"
    source: "techstack"
    target: "screens"
    type: "flow"
  - id: "e-screens-components"
    source: "screens"
    target: "components"
    type: "optional"
  - id: "e-screens-storybook"
    source: "screens"
    target: "storybook"
    type: "optional"
  - id: "e-techstack-storybook"
    source: "techstack"
    target: "storybook"
    type: "optional"
  - id: "e-brand-storybook"
    source: "brand-visual"
    target: "storybook"
    type: "optional"
  - id: "e-screens-mock"
    source: "screens"
    target: "mock"
    type: "optional"
next_flows:
  - id: "standard"
    domain: "skaileup-build"
    label: "Implement →"
    hint: "Scaffold, implement features with TDD, run tests, and verify."
  - id: "full"
    domain: "skaileup-build"
    label: "Full Production →"
    hint: "Readiness gate, design pass, comprehensive test suite, verify."
