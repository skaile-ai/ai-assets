id: "superpowers"
version: "2.0.0"
name: "Superpowers — Supervised Implementation"
description: "Disciplined subagent-driven implementation: git preparation, structured brainstorming, spec-first planning, supervised dispatch with two-stage review, and controlled branch completion."
metadata:
  tags:
    - "implementation"
    - "supervised"
    - "subagent"
    - "tdd"
    - "spec-compliance"
    - "quality"
  stage: beta
  icon: "i-heroicons-shield-check"
  category: "full-stack"
globals:
  approval_mode: "checkpoint"
  verbosity: "standard"
  git_mode: "branch"          # branch (default, all agents) | worktree (Claude Code local only)
  model_default: "sonnet"     # default model tier for implementation tasks
  task_granularity: "feature" # feature | page
modes:
  research:
    enabled: false
  standards:
    enabled: true
    skill: "standards-discover"
    inject_skill: "standards-inject"
    trigger_after: "git-prepare"
artifact_handoff:
  from_concept:
    - features
    - screens
    - datamodel
    - techstack
    - architecture
    - onboarding-decisions
entry: "git-prepare"
nodes:
  - id: "g-setup"
    type: "group"
    position:
      x: 0
      y: 0
    style:
      width: 320
      height: 200
      backgroundColor: "rgba(99,102,241,0.04)"
      border: "1px solid rgba(99,102,241,0.2)"
      borderRadius: "12px"
    data:
      label: "Setup"
      phase: "setup"

  - id: "git-prepare"
    type: "skill"
    parentNode: "g-setup"
    position:
      x: 40
      y: 80
    data:
      skill: "git-prepare"
      label: "Git Prepare"
      optional: false
      domain: "skaileup-implementation-superpowers"
      parameters:
        git_mode: "{{ globals.git_mode }}"

  - id: "g-preimpl"
    type: "group"
    position:
      x: 360
      y: 0
    style:
      width: 560
      height: 200
      backgroundColor: "rgba(245,158,11,0.04)"
      border: "1px solid rgba(245,158,11,0.2)"
      borderRadius: "12px"
    data:
      label: "Pre-Implementation"
      phase: "pre-implementation"

  - id: "brainstorm"
    type: "skill"
    parentNode: "g-preimpl"
    position:
      x: 40
      y: 80
    data:
      skill: "brainstorm"
      label: "Brainstorm"
      optional: true
      domain: "skaileup-implementation-superpowers"
      hint: "Skip for small, well-understood changes"

  - id: "write-plan"
    type: "skill"
    parentNode: "g-preimpl"
    position:
      x: 280
      y: 80
    data:
      skill: "write-plan"
      label: "Write Plan"
      optional: false
      domain: "skaileup-implementation-superpowers"
      parameters:
        task_granularity: "{{ globals.task_granularity }}"
        model_default: "{{ globals.model_default }}"

  - id: "g-implement"
    type: "group"
    position:
      x: 960
      y: 0
    style:
      width: 240
      height: 200
      backgroundColor: "rgba(16,185,129,0.04)"
      border: "1px solid rgba(16,185,129,0.2)"
      borderRadius: "12px"
    data:
      label: "Supervised Implementation"
      phase: "implementation"

  - id: "implement-supervised"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 40
      y: 80
    data:
      skill: "implement-supervised"
      label: "Implement (Supervised)"
      optional: false
      subagent: true
      domain: "skaileup-implementation-superpowers"

  - id: "g-finish"
    type: "group"
    position:
      x: 1240
      y: 0
    style:
      width: 240
      height: 200
      backgroundColor: "rgba(239,68,68,0.04)"
      border: "1px solid rgba(239,68,68,0.2)"
      borderRadius: "12px"
    data:
      label: "Finish"
      phase: "finish"

  - id: "finish-branch"
    type: "skill"
    parentNode: "g-finish"
    position:
      x: 40
      y: 80
    data:
      skill: "finish-branch"
      label: "Finish Branch"
      optional: false
      domain: "skaileup-implementation-superpowers"

edges:
  - id: "e-git-brainstorm"
    source: "git-prepare"
    target: "brainstorm"
    type: "optional"
    label: "optional"

  - id: "e-git-writeplan"
    source: "git-prepare"
    target: "write-plan"
    type: "flow"

  - id: "e-brainstorm-writeplan"
    source: "brainstorm"
    target: "write-plan"
    type: "optional"
    label: "informs"

  - id: "e-writeplan-implement"
    source: "write-plan"
    target: "implement-supervised"
    type: "flow"

  - id: "e-implement-finish"
    source: "implement-supervised"
    target: "finish-branch"
    type: "flow"

next_flows:
  - id: "audit"
    domain: "skaileup-quality"
    label: "Audit →"
    hint: "Run static analysis and structure audit on the implemented codebase."
