# skaile.yaml — publication half for skaile-ai/ai-assets
#
# Implements the canonical-identity architecture from
# workspaces/.../_devlog/specs/2026-05-31-manifest-canonical-identity.md
#
# This file declares THE canonical publisher for every asset shipped from this
# repo. Consumer projects that resolve `<kind>:<name>@skaile-ai` end up here.
#
# Version is omitted: the resolver derives it from `git describe --tags`. Cut
# a new git tag to publish a new version of every asset in this repo.

publisher: skaile-ai

# `assets:` is exhaustive for the two largest, most-depended-on domains so
# their canonical identity is locked even if the directory layout drifts.
# Other domains rely on the agentskills.io filename convention
# (<domain>/skills/<name>/SKILL.md) — the workspaces walker discovers them
# automatically.
assets:

  # ── skaile-development ────────────────────────────────────────────────────
  - { kind: skill,  name: audit, root: skaile-development/skills/audit }
  - { kind: skill,  name: bug-fix, root: skaile-development/skills/bug-fix }
  - { kind: skill,  name: compile-validators, root: skaile-development/skills/compile-validators }
  - { kind: skill,  name: component-builder, root: skaile-development/skills/component-builder }
  - { kind: skill,  name: devlog, root: skaile-development/skills/devlog }
  - { kind: skill,  name: doc, root: skaile-development/skills/doc }
  - { kind: skill,  name: e2e-platform, root: skaile-development/skills/e2e-platform }
  - { kind: skill,  name: faq, root: skaile-development/skills/faq }
  - { kind: skill,  name: git, root: skaile-development/skills/git }
  - { kind: skill,  name: good-morning, root: skaile-development/skills/good-morning }
  - { kind: skill,  name: implement, root: skaile-development/skills/implement }
  - { kind: skill,  name: jenkins-debug, root: skaile-development/skills/jenkins-debug }
  - { kind: skill,  name: kill-backend, root: skaile-development/skills/kill-backend }
