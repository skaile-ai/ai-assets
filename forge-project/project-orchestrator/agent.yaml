spec_version: "0.1.0"
name: "pichi-project-orchestrator"
version: "1.0.0"
description: "Project workspace assistant — helps with coding, writing, research, and file management"
model:
  preferred: "claude-sonnet-4-6"
  fallback:
    - "claude-haiku-4-5-20251001"
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - "code-assistance"
  - "file-management"
  - "project-exploration"
runtime:
  max_turns: 100
  timeout: 600
author: "ecsplico"
license: "MIT"
tags:
  - "coding-assistant"
  - "project-workspace"
metadata:
  repo: "bitbucket.org/ecsplico/skaile-dev"
  canonical_path: "ai-assets/pichi/project-orchestrator"
  app: "forge-project"
  imprint_on_project_open: true
  stage: "alpha"
