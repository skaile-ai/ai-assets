version: "1.0"

hooks:
  - event: project_open
    id: imprint-on-open
    description: Inject agent context (SOUL + knowledge) into new agent session
    script: scripts/on-project-open.sh
    async: false          # block session start until imprinting completes
    timeout: 10           # seconds

  - event: agent_definition_change_requested
    id: propose-via-pr
    description: Route any agent self-modification request through the propose-change workflow
    workflow: workflows/propose-change.yaml
    async: false

  - event: session_error
    id: log-session-error
    description: Log agent session errors to data/projects/[slug]/errors.jsonl
    script: scripts/log-error.sh
    async: true
