id: "standard"
version: "1.0.0"
name: "Standard Implementation"
description: "Standard full-stack implementation: scaffold, foundation, migrate/seed, feature dev with TDD, unit and integration tests, E2E, verify."
metadata:
  tags:
    - "implementation"
    - "tdd"
    - "testing"
    - "standard"
  stage: "stable"
  icon: "i-heroicons-rocket-launch"
  category: "full-stack"
globals:
  research_depth: "skip"
  approval_mode: "checkpoint"
  auto_review: false
  subagent_mode: true
  verbosity: "standard"
modes:
  research:
    enabled: false
  standards:
    enabled: true
    skill: "standards-discover"
    inject_skill: "standards-inject"
    trigger_after: "scaffold"
entry: "scaffold"
nodes:
  - id: "g-implement"
    type: "group"
    position:
      x: 0
      y: 0
    style:
      width: 1520
      height: 360
      backgroundColor: "rgba(16,185,129,0.04)"
      border: "1px solid rgba(16,185,129,0.2)"
      borderRadius: "12px"
    data:
      label: "Implementation"
      phase: "implementation"
  - id: "scaffold"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 40
      y: 160
    data:
      skill: "scaffold"
      label: "Scaffold"
      optional: false
      parameters:
        package_manager: "bun"
  - id: "foundation"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 280
      y: 160
    data:
      skill: "foundation"
      label: "Foundation"
      optional: false
  - id: "migrate"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 520
      y: 80
    data:
      skill: "migrate"
      label: "Migrate"
      optional: false
  - id: "seed"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 520
      y: 240
    data:
      skill: "seed"
      label: "Seed"
      optional: false
  - id: "implement-feature"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 760
      y: 160
    data:
      skill: "implement-feature"
      label: "Feature"
      optional: false
      subagent: true
      parameters:
        tdd: true
  - id: "test-unit"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1000
      y: 80
    data:
      skill: "test-unit"
      label: "Unit Tests"
      optional: false
      subagent: true
  - id: "test-integration"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1000
      y: 240
    data:
      skill: "test-integration"
      label: "Integration Tests"
      optional: false
      subagent: true
  - id: "e2e"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1240
      y: 160
    data:
      skill: "e2e"
      label: "E2E Tests"
      optional: true
      subagent: true
  - id: "verify"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1480
      y: 160
    data:
      skill: "verify"
      label: "Verify"
      optional: false
      subagent: true
edges:
  - id: "e-scaffold-foundation"
    source: "scaffold"
    target: "foundation"
    type: "flow"
  - id: "e-foundation-migrate"
    source: "foundation"
    target: "migrate"
    type: "flow"
  - id: "e-foundation-feature"
    source: "foundation"
    target: "implement-feature"
    type: "flow"
  - id: "e-migrate-seed"
    source: "migrate"
    target: "seed"
    type: "flow"
  - id: "e-feature-unit"
    source: "implement-feature"
    target: "test-unit"
    type: "flow"
  - id: "e-feature-integration"
    source: "implement-feature"
    target: "test-integration"
    type: "flow"
  - id: "e-feature-e2e"
    source: "implement-feature"
    target: "e2e"
    type: "optional"
  - id: "e-unit-verify"
    source: "test-unit"
    target: "verify"
    type: "flow"
  - id: "e-integration-verify"
    source: "test-integration"
    target: "verify"
    type: "flow"
  - id: "e-e2e-verify"
    source: "e2e"
    target: "verify"
    type: "optional"
next_flows:
  - id: "audit"
    domain: "skaileup-evaluate"
    label: "Audit →"
    hint: "Run static analysis and structure audit on the implemented codebase."
