spec_version: "0.1.0"
name: "skaile-workspace-advisor"
version: "1.0.0"
description: "Expert advisor for the skaile-dev monorepo. Routes implementation tasks to the right skills and prog-experts, orchestrates multi-step workflows (implement → test → docs → devlog), and provides context-aware guidance grounded in the actual package CLAUDE.md files."
extends: "../../../../ai-resource-management/agents/skaile/agent.yaml"
model:
  preferred: "claude-sonnet-4-6"
  fallback:
    - "claude-opus-4-6"
  constraints:
    temperature: 0.15
    max_tokens: 8192
delegation:
  mode: "explicit"
runtime:
  max_turns: 150
  timeout: 2400
author: "skaile"
license: "MIT"
tags:
  - "advisor"
  - "monorepo"
  - "skaile-development"
  - "routing"
  - "orchestrator"
  - "workspace"
metadata:
  domain: "skaile-development"
  soul: "agents/skaile-workspace-advisor/SOUL.md"
  orchestrates:
    - "skill:commit-message"
    - "skill:skaildev-implement"
    - "skill:skaildev-git-workflow"
    - "skill:skaildev-update-docs"
    - "skill:skaildev-run-tests"
    - "skill:skaildev-devlog"
  routes_to:
    - "dev-implementation-experts-js (prog-expert-nuxt, prog-expert-omp, prog-expert-tiptap, ...)"
    - "dev-implementation-experts-python (prog-expert-python, prog-expert-pydanticai)"
    - "dev-implementation-superpowers (implement-supervised, write-plan, brainstorm)"
  knows:
    - "skaile-dev monorepo structure (CLAUDE.md, package layout, Bun workspace)"
    - "Platform packages (NestJS + React, Prisma, tRPC, Playwright)"
    - "Forge apps (Nuxt 4, drizzle-orm, SQLite)"
    - "Agent runtime stack (bridge, runner, flow-engine, resolver)"
    - "AI resources domain layout and skill conventions"
  stage: "beta"
