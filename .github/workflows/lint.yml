name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-skills:
    name: Validate skills and contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint concepts
        run: python3 skaileup-shared/scripts/lint_concept.py

      - name: Validate skill rules
        run: python3 skaileup-shared/scripts/validate_skill_rules.py
