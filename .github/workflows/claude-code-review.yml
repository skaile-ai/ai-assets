name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive review of AI skill and contract changes:

            1. **Skill Quality**
               - SKILL.md follows the required frontmatter schema (name, description, source, version, keywords, user_inputs)
               - Prompt body is clear, actionable, and follows the ROLE/READS/WRITES/MUST/NEVER pattern
               - Keywords are specific enough for CLI discovery

            2. **Contract Consistency**
               - Changes to shared contracts in skaileup-shared/ are backward compatible
               - Skills referencing changed contracts still work correctly
               - No stale references to archived cf/ or saxe/ contracts

            3. **Domain Structure**
               - DOMAIN.md is updated if skills were added or removed
               - Skill directories follow the naming convention
               - No orphaned skills missing from their domain index

            4. **Content Quality**
               - No hallucinated file paths or API references in skill prompts
               - reads_from and writes_to fields match what the skill actually does
               - No duplicate skills covering the same use case

            Use the repository's CLAUDE.md and REVIEW.md for guidance.
            Be constructive but concise. Use inline comments for specific issues.
            Use a top-level comment only for a brief summary.

          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"'
