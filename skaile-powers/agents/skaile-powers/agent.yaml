spec_version: '0.1.0'
name: 'skaile-powers'
version: '1.0.0'
description: 'Workflow orchestrator for the skaile-powers method. Drives a development session from idea to merged branch — grilling, numbered specs, bead plans, subagent execution, and review — and keeps the glossary, decisions, and devlog current.'
model:
  preferred: 'opus'
  fallback:
    - 'sonnet'
  constraints:
    temperature: 0.15
    max_tokens: 8192
delegation:
  mode: 'explicit'
runtime:
  max_turns: 150
  timeout: 2400
author: 'skaile'
license: 'MIT'
tags:
  - 'orchestrator'
  - 'workflow'
  - 'skaile-powers'
  - 'planning'
metadata:
  domain: 'skaile-powers'
  soul: 'agents/skaile-powers/SOUL.md'
  orchestrates:
    - 'skill:using-skaile-powers'
    - 'skill:brainstorming'
    - 'skill:grill-me'
    - 'skill:writing-plans'
    - 'skill:writing-skills'
    - 'skill:prototype'
    - 'skill:improving-codebase-architecture'
    - 'skill:systematic-debugging'
    - 'skill:test-driven-development'
    - 'skill:subagent-driven-development'
    - 'skill:dispatching-parallel-agents'
    - 'skill:executing-plans'
    - 'skill:using-git-worktrees'
    - 'skill:requesting-code-review'
    - 'skill:receiving-code-review'
    - 'skill:verification-before-completion'
    - 'skill:finishing-a-development-branch'
  stage: 'beta'
